<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Projetos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 500px;
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; }
    .project-card {
      display: block;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    .project-card:hover {
      transform: translateY(-5px);
      border-color: #667eea;
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
    }
    .project-card h2 { margin-bottom: 8px; color: #667eea; }
    .project-card span { 
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      margin: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💻 Meus Projetos</h1>
    <p>Projetos desenvolvidos para aprendizado e prática</p>
    
    <a href="./projetos/quiz/" class="project-card">
      <h2>🎯 Quiz para Programadores</h2>
      <p>Quiz desenvolvido com HTML, CSS e JavaScript</p>
      <div>
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
      </div>
    </a>
  </div>
</body>
</html>

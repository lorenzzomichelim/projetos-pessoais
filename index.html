<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Projetos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 60px 20px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #8b949e;
      margin-bottom: 40px;
    }
    .project {
      display: block;
      background: #161b22;
      border: 1px solid #30363d;
      padding: 20px;
      border-radius: 8px;
      text-decoration: none;
      color: #e6edf3;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .project:hover {
      border-color: #58a6ff;
    }
    .project h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #58a6ff;
    }
    .project p {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 12px;
    }
    .tags span {
      background: #21262d;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      margin-right: 6px;
      color: #8b949e;
    }
    footer {
      margin-top: 50px;
      color: #8b949e;
      font-size: 14px;
    }
    footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Meus Projetos</h1>
    <p class="subtitle">Projetos pessoais de programação</p>
    
    <a href="./projetos/quiz/" class="project">
      <h2>Quiz</h2>
      <p>Quiz interativo com perguntas e respostas</p>
      <div class="tags">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
      </div>
    </a>

    <footer>
      <a href="https://github.com/lorenzzomichelim" target="_blank">GitHub</a>
    </footer>
  </div>
</body>
</html>
